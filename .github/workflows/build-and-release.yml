name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: thornex/music-party
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. 构建 Docker 镜像 (Linux)
  build-and-push-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2. 构建 Windows 便携式 EXE
  build-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write
    # 仅在推送 Tag 时执行 EXE 发布
    if: github.ref_type == 'tag'
    defaults:
      run:
        shell: pwsh
    steps:
      # A. 检出主仓库 (强制清理)
      - name: Checkout MusicParty
        uses: actions/checkout@v4
        with:
          clean: true

      # B. 检出正确的 Netease API 仓库到独立路径
      - name: Checkout Netease API Enhanced
        uses: actions/checkout@v4
        with:
          repository: NeteaseCloudMusicApiEnhanced/api-enhanced
          path: external-api-source
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: music-party-web/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: launcher/go.mod

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Frontend
        run: |
          cd music-party-web
          npm install
          npm run build

      - name: Build Java Backend
        run: |
          if (Test-Path "src/main/resources/static") { Remove-Item -Recurse -Force "src/main/resources/static" }
          New-Item -ItemType Directory -Force "src/main/resources/static"
          Copy-Item -Recurse "music-party-web/dist/*" "src/main/resources/static/"
          mvn clean package -DskipTests

      # C. 编译 API EXE (使用官方 working-directory 隔离环境)
      - name: Build Netease API EXE
        working-directory: ./external-api-source
        run: |
          npm install
          npx pkg . -t node18-win-x64 -o ../launcher/bin/netease-api.exe

      - name: Prepare Assets
        run: |
          if (-not (Test-Path "launcher/bin")) { 
            New-Item -ItemType Directory "launcher/bin" 
          }
          
          # 1. 拷贝 Java 后端 (排除 original JAR)
          echo "Copying Server JAR..."
          $jarFile = Get-ChildItem "target/*.jar" | Where-Object { $_.Name -like "MusicParty*" -and $_.Name -notmatch "original" } | Select-Object -First 1
          if ($jarFile) {
            Copy-Item $jarFile.FullName "launcher/bin/server.jar"
            echo "Copied $($jarFile.Name) to server.jar"
          } else {
            echo "ERROR: Server JAR not found in target/"
            ls target/
            exit 1
          }
          
          # 2. [优化] 使用 jlink 构建极简 JRE (仅包含必要模块)
          echo "Building custom minimal JRE..."
          # 分析 JAR 依赖模块 (基础模块 + 常用网络/解析模块)
          $modules = "java.base,java.logging,java.naming,java.desktop,java.management,java.security.jgss,java.instrument,java.sql,jdk.unsupported,java.net.http,java.xml"
          jlink --add-modules $modules --strip-debug --no-man-pages --no-header-files --compress=2 --output launcher/bin/jre

          # 3. 下载并准备 FFmpeg (精简版)
          echo "Downloading FFmpeg..."
          # 使用更加精简的构建版本或继续使用原有版本
          $ffmpegUrl = "https://github.com/GyanD/codexffmpeg/releases/download/7.0.1/ffmpeg-7.0.1-essentials_build.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath temp_ffmpeg
          $ffExe = Get-ChildItem -Path temp_ffmpeg -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          Copy-Item $ffExe.FullName "launcher/bin/ffmpeg.exe"
          Remove-Item ffmpeg.zip, temp_ffmpeg -Recurse -Force

          # 4. [优化] 安装并使用 UPX 压缩二进制
          echo "Installing UPX..."
          choco install upx
          echo "Compressing binaries with UPX..."
          upx --best "launcher/bin/ffmpeg.exe"
          upx --best "launcher/bin/netease-api.exe"
          # 注意：不建议压缩 server.jar，因为它是 ZIP 格式，UPX 处理效果不佳且可能破坏结构


      - name: Build Wails Launcher
        run: |
          cd launcher
          go mod tidy
          wails build -platform windows/amd64

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: launcher/build/bin/MusicParty.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
